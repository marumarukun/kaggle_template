services:
  gpu:
    container_name: kaggle-template
    build:
      context: .
      dockerfile: Dockerfile
    shm_size: '64gb'
    volumes:
      - type: bind
        source: $PWD
        target: /workspace
    working_dir: /workspace
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [ gpu ]
    tty: true
    command: /bin/bash
